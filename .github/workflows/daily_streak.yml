name: 🔥 Daily Streak Bot

on:
  schedule:
    - cron: '0 15 * * *'   # Runs every day at 8:30 PM IST (3:00 PM UTC)
  workflow_dispatch:        # Allows manual trigger from GitHub UI anytime

jobs:
  commit-daily:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🤖 Run Streak Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python bot/streak_bot_actions.py

      - name: 📤 Commit and Push
        run: |
          git config --global user.name "animesh363"
          git config --global user.email "animeshanand86033@gmail.com"
          git add .
          git diff --staged --quiet || git commit -m "feat: daily streak commit $(date +'%Y-%m-%d')"
          git push